<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gut pump</title>

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0d0f0c" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ============ View 1: Übungsliste ============ -->
<main id="view-list" class="view">
  <header class="app-header">
    <div class="app-title">
      <svg class="icon-dumbbell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 12h2M4 8v8M6 9v6h2V9zM16 9v6h2V9zM18 8v8M20 12h2M8 12h8" />
      </svg>
      <span>Gut pump</span>
    </div>
    <div class="app-header-right">
      <div id="sessions-badge" class="sessions-badge">0 Sessions in 7 Tagen</div>
      <button id="settings-btn" class="icon-btn" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>

      <div id="settings-menu" class="settings-menu hidden">
        <button data-action="open-add-exercise">Übung hinzufügen</button>
        <button data-action="enter-edit-mode">Übung bearbeiten</button>
        <button data-action="open-table">Datentabelle</button>
      </div>
    </div>
  </header>

  <div id="exercise-list" class="exercise-list"></div>
</main>

<!-- ============ View 2: Datentabelle ============ -->
<main id="view-table" class="view hidden">
  <header class="table-header">
    <button id="table-back-btn" class="icon-btn" aria-label="Zurück">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>
    <svg class="icon-table" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" /><path d="M3 9h18M3 15h18M9 3v18" />
    </svg>
    <span class="table-title">Datentabelle</span>
    <div id="table-count" class="table-count">0 Einträge</div>
  </header>

  <div id="filter-pills" class="filter-pills"></div>

  <div class="table-scroll">
    <table id="data-table">
      <thead>
        <tr><th>Datum</th><th>Übung</th><th>Gruppe</th><th>Kg</th><th>Wdh</th></tr>
      </thead>
      <tbody id="data-table-body"></tbody>
    </table>
  </div>
</main>

<!-- ============ Floating Edit-Mode Exit Button ============ -->
<button id="exit-edit-mode-btn" class="exit-edit-btn hidden" aria-label="Bearbeitungsmodus verlassen">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M18 6 6 18M6 6l12 12" />
  </svg>
</button>

<!-- ============ Dialog: Übung hinzufügen / bearbeiten ============ -->
<div id="exercise-dialog-overlay" class="overlay hidden">
  <div class="dialog" id="exercise-dialog">
    <div class="dialog-header">
      <h2 id="exercise-dialog-title">Übung hinzufügen</h2>
      <button class="icon-btn" data-action="close-exercise-dialog" aria-label="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12" /></svg>
      </button>
    </div>

    <button id="delete-exercise-btn" class="delete-exercise-btn hidden" data-action="delete-exercise">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z" />
      </svg>
      Übung löschen
    </button>

    <form id="exercise-form">
      <label class="field-label" for="exercise-name-input">Übungsname</label>
      <input id="exercise-name-input" type="text" placeholder="z.B. Lat-Zug" required />

      <label class="field-label" for="exercise-group-select">Muskelgruppe</label>
      <select id="exercise-group-select">
        <option value="Rücken">Rücken</option>
        <option value="Brust">Brust</option>
        <option value="Schultern">Schultern</option>
        <option value="Arme">Arme</option>
        <option value="Beine">Beine</option>
      </select>

      <label class="field-label">Symbol / Bild</label>
      <div class="image-upload-row">
        <div id="exercise-image-preview" class="image-preview"></div>
        <input id="exercise-image-input" type="file" accept="image/*" />
      </div>

      <button type="submit" id="exercise-confirm-btn" class="primary-btn">Hinzufügen</button>
    </form>
  </div>
</div>

<!-- ============ Dialog: Löschen bestätigen ============ -->
<div id="confirm-delete-overlay" class="overlay hidden">
  <div class="dialog dialog-small">
    <p>Übung wirklich löschen? Alle gespeicherten Einträge dieser Übung gehen dabei unwiderruflich verloren.</p>
    <div class="confirm-actions">
      <button class="secondary-btn" data-action="cancel-delete">Abbrechen</button>
      <button class="danger-btn" data-action="confirm-delete">Löschen</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
